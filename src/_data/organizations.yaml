meta:
  title: "For Organizations — Coworker Labs"
  description: "The Coworker Framework maps where your coordination tax lives. AI Transformational Consultancy builds the strategy to eliminate it."

hero:
  section_label: "For Organizations"
  heading_line1: "Your teams are spending 60% of their day"
  heading_line2: "on coordination. Not work."
  subtext: "The coordination tax — email, follow-ups, status checks, waiting — is the single largest productivity drain in most organizations. Agent-to-agent AI can eliminate it. The Coworker Framework shows you exactly where to start."

problem:
  section_label: "The Problem"
  heading: "Organizations are at the cusp of AI adoption. Most don't know where to start."
  body_para1: "Most organizations have subscribed to AI tools. Some have engaged advisors. Built pilots. Attended briefings. The coordination tax is unchanged."
  body_para2: "Cross-functional teams spend 60% of their day managing handoffs — not doing the work they were hired to do. Email threads. Status checks. Waiting for someone to respond. Following up on a document. This isn't a people problem. It's a structural one. And most AI strategies don't address the right layer."
  kicker: "Agent-to-agent AI systems can eliminate the coordination layer entirely. But only if you know where to deploy them."
  stats:
    - number: "1%"
      label: "of business leaders say their AI strategy is \"mature.\""
      source: "McKinsey, 2025"
    - number: "95%"
      label: "of enterprise AI pilots fail to generate measurable business impact."
      source: "MIT / Fortune, 2025"
    - number: "60%"
      label: "of the workday consumed by coordination, not core work."
      source: "Industry average, cross-functional workflows"

