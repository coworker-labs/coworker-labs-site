  title: "Founder, Coworker Labs"
  linkedin_url: "https://www.linkedin.com/in/aparoop/"
  linkedin_label: "↗ linkedin.com/in/aparoop"
  story_heading: "Built by someone who has been on every side of this problem."
  story_text: "Aparoop spent 10 years at Google solving organizational workflows and processes — and buying from system integrators. He knows what good advisory looks like, and what conflicted advisory costs. The last four years he has been inside the rooms where AI is actually being built — Silicon Valley founder communities, VC investment circles, researcher meetups, AI SaaS workshops, builder networks — while selling AI solutions to enterprise buyers. He came in as a non-technical professional. He left having built AI products, including this one. He understands what professionals need to stay relevant. He understands what organizations need to stop getting it wrong. Coworker Labs is built on that lens."

