meta:
  title: "Coworker Labs — AI Adoption for the World"
  description: "The world is adopting AI. Most are getting a part of the puzzle. Coworker Labs connects you to Silicon Valley practitioners building what comes next."

hero:
  brand_label: "Coworker Labs"
  heading_line1: "The world is adopting AI."
  heading_line2: "Most of it is getting it wrong."
  subtext: "The courses are outdated. The advisory is behind. Coworker Labs connects you to practitioners from Silicon Valley who are building what comes next — so you adopt the right technology, at the right time."
  cta_primary_label: "Join the First Cohort — April 28 →"
  cta_primary_url: "#apply"
  cta_secondary_label: "See all programs"
  cta_secondary_url: "#programs"
  detail: "14 hours &nbsp;·&nbsp; $499 &nbsp;·&nbsp; Seats are limited."

adoption_gap:
  section_label: "The Adoption Gap"
  heading_line1: "78% of organizations"
  heading_line2: "use AI. Only 7% have"
  heading_line3: "made it work."
  body_para1: "You've tried the tools. Maybe taken a course. You can feel that something is missing — but it's hard to name exactly what."
  body_para2: "Here's what's missing: the people who actually know what AI can do — and what it can't — are concentrated in a handful of companies. The rest of the world is learning from content that was already out of date when it was published."
  kicker: "This isn't a technology problem. It's a knowledge distribution problem."
  stats_footer: "The technology moved. Most of the education didn't."
  stats:
    - number: "1%"
      label: "of business leaders say their AI strategy is \"mature.\""
      source: "McKinsey Superagency in the Workplace, 2025"
    - number: "95%"
      label: "of enterprise AI pilots fail to generate measurable business impact."
      source: "MIT / Fortune, 2025"
    - number: "4→72%"
      label: "AI performance on real engineering tasks — in a single year."
      source: "Stanford HAI AI Index, 2025"

next_wave:
  section_label: "The Next Wave"
  heading: "Agentic AI is here. The decisions you make in the next 12 months will define your organization's AI architecture for years."
  body_para1: "AI has moved from answering questions to taking action. Agentic systems now run workflows, make decisions, and operate autonomously across business functions. This isn't a future trend — it's what's shipping today at companies like Google, Microsoft, and Anthropic."
  body_para2: "Organizations that build their AI operating layer on current knowledge will have a structural advantage. Those that adopt outdated frameworks — because that's what their training taught them — will spend the next five years catching up."
  window_text: "The window to get this right is open. It won't stay open."

how_different:
  section_label: "How We're Different"
  heading_line1: "Not a school. Not a co-sell hub."
  heading_line2: "A coworker."
  body_para1: "A coworker doesn't hand you a textbook. They tell you what's actually working. They help you figure out what to do on Monday. They help you ."
  body_para2: "That's what Coworker Labs is — a team headquartered in Silicon Valley, with direct access to the practitioners building what's next, who work alongside you through the adoption process."
  body_para3: "The knowledge is current because the people are current. There's no lag between what's shipping and what we teach."
  pillars:
    - title: "Current knowledge"
      body: "Our instructors work at companies building AI right now. Not 2025 AI. Today's AI which changes every month. What they know, you'll know."
    - title: "Silicon Valley network"
      body: "You don't just learn from the valley — you connect to it. The network you build here is as valuable as the skills."
    - title: "Hands-on, domain-specific"
      body: "No generic AI theory. Programs are built around your domain — product, operations, marketing, education, and more."

programs:
  section_label: "Programs"
  heading: "We have two offerings."
  cards:
    - title: "Cohort-Based Learning"
      body: "For professionals who need to understand what AI means for their career — and do something real with it. Hands-on. Domain-specific. Led by practitioners from the companies building AI today."
      meta: "Next cohort: April 28 &nbsp;·&nbsp; $499 / 14 hours"
      cta_label: "Apply now →"
      cta_url: "#apply"
      cta_style: "btn-primary"
    - title: "Bring Your Own Project"
      body: "You have an idea. We help you build it. 1:1 guidance for personal projects and non-technical founders who need engineering support to bring something to life. No generic advice — we work on your thing."
      meta: "Custom engagement"
      cta_label: "Get in touch →"
      cta_url: "#apply"
      cta_style: "btn-outline"
    - title: "AI for EdTech"
      body: "If educators don't understand AI, their students won't either. Those students become the professionals and leaders of the next two decades. The circle stays broken — unless you start with the educators. Faculty training, student programs, and institutional AI policy."
      meta: "Schools &nbsp;·&nbsp; Colleges &nbsp;·&nbsp; Training Centers &nbsp;·&nbsp; Online / Offline / Hybrid"
      cta_label: "Get in touch →"
      cta_url: "#apply"
      cta_style: "btn-outline"
    - title: "AI for Enterprises"
      body: "For mid-market organizations that need an AI strategy, not just AI tools. Team training, adoption roadmaps, and ongoing advisory — from a team that knows what's working at the companies leading the space."
      meta: "Custom engagement"
      cta_label: "Talk to us →"
      cta_url: "#apply"
      cta_style: "btn-outline"

