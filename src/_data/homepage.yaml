founder:
  section_label: "Why We Built This"
  name: "Aparoop Chakraborty"
  title: "Founder, Coworker Labs"
  linkedin_url: "https://www.linkedin.com/in/aparoop/"
  linkedin_label: "↗ linkedin.com/in/aparoop"
  traction:
    - strong_text: "AI Advisor"
      rest_text: " — Dimois Training Center, Riyadh.<br>Shaping Riyadh's first AI-first Training Institute."
    - strong_text: "First cohort"
      rest_text: " — April 28, 2026.<br>$499 &nbsp;·&nbsp; 14 hours &nbsp;·&nbsp; Applications open."
  story_heading_line1: "Two years ago, Aparoop didn't know how to build software."
  story_heading_line2: "Today he builds AI products. Here's what happened in between."
  story_paragraphs:
    - text: "Aparoop Chakraborty is not a software engineer. He never was. But two years ago, he decided that wasn't an excuse to stay on the outside of the most important technology shift of his career."
      highlight: false
    - text: "What followed was two years of deliberate immersion. He built a network on LinkedIn — not to broadcast, but to listen. He got into communities where Silicon Valley founders were talking candidly about what was working and what wasn't. He read VC reports that don't reach the public eye — the ones where investors share unfiltered views on where AI is actually going. He showed up to meetups where researchers talked about how the technology was evolving, not how it was being marketed. He followed the podcasts and the accelerators tracking what was being built and what it meant for organizations and professionals who weren't engineers."
      highlight: false
    - text: "Every two weeks, the story changed. New benchmarks. New architectures. New products that made the previous ones look like early drafts."
      highlight: false
    - text: "The thing that struck him wasn't just how fast AI was moving. It was how far the rest of the world was from seeing it clearly. The gap between what he was learning in those rooms and communities — and what was available in courses, articles, corporate training programs — was enormous. And it was growing."
      highlight: true
    - text: "He built products — including this one — with what he learned. Then he built Coworker Labs so you could get there without spending two years figuring out where to look."
      highlight: false

