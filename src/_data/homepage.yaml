meta:
  title: "Coworker Labs — Meet Your New Coworker"
  description: "Coworker Labs helps professionals and organizations understand agentic AI, adopt it, and build with it — before they're left behind."

hero:
  brand_label: "Coworker Labs · Silicon Valley"
  heading: "Meet your new coworker."
  subtext: "The world has moved to agentic AI. Coworker Labs is built for the professionals and organizations navigating that transition — before the technology moves further ahead."
  cta_primary_label: "I'm a Professional →"
  cta_primary_url: "professionals.html"
  cta_secondary_label: "I'm an Organization →"
  cta_secondary_url: "organizations.html"

positioning:
  section_label: "What We Do"
  paragraphs:
    - "The world has moved to agentic AI. Most professionals and organizations haven't caught up. Not because they haven't tried — they've watched the demos, subscribed to the tools, attended the briefings. But the gap between knowing AI exists and knowing what to do with it has never been wider."
    - "Coworker Labs is built for that gap. For the professional who needs a clear on-ramp before the technology moves further ahead. For the organization that has started its AI journey and found it stalling."
    - "Professionals get cohort-based learning — hands-on, practitioner-led, Silicon Valley current. Organizations get AI transformational consultancy — independent, strategic, built for now."

tracks:
  section_label: "Find where you fit"
  cards:
    - track: "Professionals"
      heading: "Coworker Lite & Pro"
      body: "AI fundamentals, vibe coding, and hands-on building — for non-technicals and engineers. Silicon Valley practitioners as your instructors. A Bay Area community when the cohort ends."
      cta_label: "See Programs →"
      cta_url: "professionals.html"
      cta_style: "btn-primary"
    - track: "Organizations"
      heading: "AI Transformational Consultancy"
      body: "The Coworker Framework maps where your coordination tax lives. From there, we build the strategy — independent, no vendor relationships, starting with a free discovery call."
      cta_label: "See How It Works →"
      cta_url: "organizations.html"
      cta_style: "btn-outline"
