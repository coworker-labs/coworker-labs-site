adoption_gap:
  section_label: "The Adoption Gap"
  heading_line1: "78% of organizations"
  heading_line2: "use AI. Only 7% have"
  heading_line3: "made it work."
  body_para1: "For professionals: the courses are generic, dated, and built for engineers — not for the program manager, the marketing director, or the operations lead trying to figure out what AI means for their role."
  body_para2: "For organizations: the advisory is shaped by vendor relationships and certifications from 18 months ago — not by what's actually right for the business. Wrong architecture gets built. Pilots stall. The gap widens."
  kicker: "This isn't a technology problem. It's a knowledge distribution problem."
  stats_footer: "The technology moved. Most of the education and advisory didn't."
  stats:
    - number: "1%"
      label: "of business leaders say their AI strategy is \"mature.\""
      source: "McKinsey Superagency in the Workplace, 2025"
    - number: "95%"
      label: "of enterprise AI pilots fail to generate measurable business impact."
      source: "MIT / Fortune, 2025"
    - number: "4→72%"
      label: "AI performance on real engineering tasks — in a single year."
      source: "Stanford HAI AI Index, 2025"

next_wave:
  section_label: "The Next Wave"
  heading: "Agentic AI is here. The decisions you make in the next 12 months will define your career and your organization's AI architecture for years."
  body_para1: "AI has moved from answering questions to taking action. Agentic systems now run workflows, make decisions, and operate autonomously across business functions. This isn't a future trend — it's what's shipping today at companies like Google, Microsoft, and Anthropic."
  body_para2: "Professionals who build with agentic AI today will own the roles that matter tomorrow. Organizations that build their AI operating layer on current knowledge will have a structural advantage. Those working from outdated frameworks will spend the next five years catching up."
  window_text: "The window to get this right is open. It won't stay open."

how_different:
  section_label: "How We're Different"
  heading_line1: "Not a school. Not a co-sell hub."
  heading_line2: "A coworker."
  body_para1: "For professionals: a coworker doesn't hand you a textbook. They sit with you, understand your role, and help you figure out what to build on Monday — with the latest tools, not last year's curriculum."
  body_para2: "For organizations: a coworker doesn't have a vendor quota. They tell you what's actually right for your situation — because their only incentive is your outcome."
  body_para3: "The knowledge is current because the people are current. Silicon Valley practitioners building AI today — in your cohort, on your project."
  pillars:
    - title: "Current knowledge"
      body: "Our instructors and consultants work at MAG7 and top-tier SaaS companies building AI right now. What they know today, you'll know this week."
    - title: "Silicon Valley community"
      body: "You don't just learn from the valley — you join it. Every cohort graduate gets lifelong access to a private Silicon Valley AI community that keeps you current as the technology evolves."
    - title: "Hands-on, domain-specific"
      body: "No generic AI theory. Cohorts are built around your professional domain. Consulting is built around your organization's actual context. You leave with something real — not a certificate."

programs:
  section_label: "Programs"
  heading: "Two ways to work with us. One for professionals. One for organizations."
  cards:
