meta:
  title: "Programs — Coworker Labs"
  description: "Coworker Labs serves professionals, builders, and organizations. Each with a different fear. Each with a different shift to make. All three in safe hands."

hero:
  section_label: "Programs"
  heading_line1: "Whatever brought you here,"
  heading_line2: "you're in the right place."
  subtext: "AI is creating a different kind of pressure for professionals, builders, and organizations. The fear is real. The path forward is different for each. We've built something for all three."

tabs:
  - id: "professionals"
    label: "Professionals"
    sub: "Scared of losing relevance"
    fear_icon: "🧭"
    fear_heading: "You're not afraid of losing your job. You're afraid of losing the next one."
    fear_body: "Your company went AI-first. The people around you who \"get AI\" are pulling ahead. You've done the courses. You still can't point to anything different you're doing on Monday. The gap between where you are and where you need to be feels like it's growing faster than you can close it.<br><br><strong>Here's the real issue:</strong> the courses are teaching you skills. Skills are becoming commodities. What you actually need is to raise the level of abstraction of your value — and that's something no one is teaching."
    table_headers:
      col_feeling: "What you're feeling"
      col_shift: "The shift you need to make"
      col_us: "What Coworker Labs gives you"
      col_leave: "What you leave with"
    value_table:
      - category: "Career risk"
        feeling: "AI is replacing the skills I built my career on"
        shift: "Stop selling your skillset. Start owning your value. \"I manage $5M in delivery\" not \"I am a project manager.\""
        us: "Domain-specific sessions that connect AI to your specific function and role"
        leave: "A clear articulation of your value — and how AI makes you 10× more effective at delivering it"
      - category: "Knowledge gap"
        feeling: "I've done the courses. I still don't know what to do on Monday."
        shift: "Theoretical AI knowledge → applied AI capability in your domain"
        us: "Practitioners who've deployed AI in the same functions you work in. Real use cases, not textbook examples."
        leave: "The specific AI moves that create leverage in your role — product, ops, sales, marketing, finance, or education"
      - category: "Organizational navigation"
        feeling: "Even if I had a good idea, I wouldn't know how to land it internally"
        shift: "Learning the technology → understanding the organizational terrain around it"
        us: "Experts from customer-facing teams share why AI initiatives succeed or fail inside real organizations"
        leave: "The ability to identify the right use case AND navigate the organization to make it happen"
      - category: "Thought leadership"
        feeling: "I want to be seen as someone who drives change, not someone who reacts to it"
        shift: "Being informed → being the person who brings the view the room doesn't have"
        us: "Direct access to Silicon Valley practitioners — the source of the view, not a second-hand version of it"
        leave: "The credibility and network to show up differently in every room you're in"
      - category: "Network"
        feeling: "My network doesn't include the people shaping where AI is going"
        shift: "Learning alone → being part of the community where the next shift is visible first"
        us: "Private Silicon Valley AI community — not a LinkedIn group, an earned access network"
        leave: "Connections you couldn't build in two years of trying on your own"
    abstraction_heading: "The shift that actually matters: raising the abstraction of your value"
    abstraction_para1: "Every professional has two versions of their identity. The skill version and the value version. AI is rapidly commoditizing the skill version. The professionals who stay ahead are the ones who can articulate — and then deliver — the value version."
    abstraction_para2: "<strong>Skill is what you do. Value is what you're responsible for.</strong> AI amplifies value. It doesn't amplify skill — it replaces it."
    abstraction_para3: "Coworker Labs helps you make this shift — not in theory, but through a Capstone that forces you to articulate your value, and a cohort of peers and practitioners who hold you to it."
    shift_examples:
      - before_label: "Before"
        before_text: "I am a data analyst"
        after_label: "After"
        after_text: "I manage the data infrastructure that supports $5M in annual delivery"
      - before_label: "Before"
        before_text: "I am a project manager"
        after_label: "After"
        after_text: "I manage a $1M project portfolio. I'm building our Procurement Agent."
      - before_label: "Before"
        before_text: "I am a consultant"
        after_label: "After"
        after_text: "I am responsible for $1M in client revenue — consistently delivered at 20% lower cost"
      - before_label: "Before"
        before_text: "I work in marketing"
        after_label: "After"
        after_text: "I manage a $1M marketing budget. I'm building our GTM tool."
    cta_strip_heading: "Cohort-Based Learning — April 28, 2026"
    cta_strip_sub: "14 hours &nbsp;·&nbsp; $499 &nbsp;·&nbsp; Limited seats &nbsp;·&nbsp; Practitioners as instructors"
    cta_strip_label: "Apply Now →"
    cta_strip_url: "index.html#apply"
    cta_strip_style: "btn-primary"

  - id: "builders"
    label: "Builders"
    sub: "Scared of building the wrong thing"
    fear_icon: "🔧"
    fear_heading: "You're afraid the thing you're building will be obsolete before it launches."
    fear_body: "Every six months, a foundation model drops that does what your product does — natively, faster, cheaper. The abstraction layer keeps moving. Yesterday's differentiation is today's commodity. You're not building on solid ground; you're building on a surface that shifts every quarter.<br><br><strong>The builders who survive this cycle</strong> are the ones who stop competing on what the technology does and start competing at a higher level of abstraction — on the outcome they deliver. And they stay current enough to keep repositioning before obsolescence hits."
    table_headers:
      col_feeling: "What you're feeling"
      col_shift: "The shift you need to make"
      col_us: "What Coworker Labs gives you"
      col_leave: "What you leave with"
    value_table:
      - category: "Product obsolescence"
        feeling: "A new model will do what I'm building in six months"
        shift: "Competing on features → competing on the outcome you deliver at a higher level of abstraction"
        us: "Practitioners at the frontier who can tell you what's six months away — so you're repositioned before it arrives"
        leave: "A value proposition that survives model updates: \"I reduce your cost of services by 80%\" or \"I give you a capability you don't have today\""
      - category: "Building in the dark"
        feeling: "I don't know which architecture decisions will age well"
        shift: "Learning from documentation → learning from practitioners who are making those architecture decisions right now"
        us: "Silicon Valley educators who teach tomorrow's architecture — not the one that was current four months ago"
        leave: "Architecture decisions grounded in where the frontier is heading, not where it is today"
      - category: "Go-to-market"
        feeling: "I know how to build. I don't know how to sell to buyers who don't understand what I'm building."
        shift: "Technical value prop → business value prop that a non-technical buyer can act on"
        us: "Experts who've sold AI solutions to enterprise buyers. They know exactly what lands and what gets lost in translation."
        leave: "A way of talking about your product that connects to what buyers actually care about"
      - category: "1:1 project support"
        feeling: "Generic advice doesn't help. I need someone who understands what I'm actually building."
        shift: "Solo building → building with a network that includes people who've solved adjacent problems"
        us: "Bring Your Own Project — 1:1 engagements where we work on your specific project, not a hypothetical"
        leave: "A stress-tested product direction and the connections to keep iterating it"
    abstraction_heading: "The abstraction shift every builder needs to make"
    abstraction_para1: "The builders who stay relevant don't compete on what their technology does — they compete on the outcome they own at a higher level. When the underlying technology becomes commoditized, the outcome they're responsible for doesn't."
    abstraction_para2: ""
    abstraction_para3: ""
    shift_examples:
      - before_label: "Feature-level"
        before_text: "I built an AI content assistant"
        after_label: "Outcome-level"
        after_text: "I give you a content capability you don't have today — and I'll still give you something you don't have in 12 months"
      - before_label: "Feature-level"
        before_text: "I built an AI workflow tool"
        after_label: "Outcome-level"
        after_text: "I reduce your cost of services by 80%"
    cta_strip_heading: "Bring Your Own Project — 1:1"
    cta_strip_sub: "Customized engagement &nbsp;·&nbsp; We work on your project, not a hypothetical"
    cta_strip_label: "Get in touch →"
    cta_strip_url: "index.html#apply"
    cta_strip_style: "btn-primary"

  - id: "organizations"
    label: "Organizations"
    sub: "Unsure who to trust"
    fear_icon: "🏢"
    fear_heading: "You know you need an AI strategy. You're not sure who to trust to help you build one."
    fear_body: "Your organization is under pressure to move on AI — from the board, from the market, from competitors. You've engaged consultants and SIs. They've given you a roadmap. But something feels off. The advice is confident and the fees are high, but you're not sure the people advising you are actually close enough to the frontier to know what's right for you.<br><br><strong>Here's the structural problem:</strong> every major SI, consulting firm, and advisory practice has vendor relationships, co-selling agreements, and quarterly quotas. The advice you're getting is shaped by incentives you can't fully see. And the macro factors actually reshaping your industry — workforce shifts, cost pressure, agentic AI in operations — aren't being addressed because the advisor isn't current enough to see them."
    table_headers:
      col_feeling: "What you're facing"
      col_shift: "What's getting in the way"
      col_us: "What Coworker Labs provides"
      col_leave: "What changes"
    value_table:
      - category: "AI strategy"
        feeling: "We need an AI strategy that reflects where the market is heading, not where it was 18 months ago"
        shift: "Advisors who are credentialed but not current. Recommendations shaped by what they're incentivized to sell."
        us: "Independent advisory with no vendor relationships and no co-selling. Our advice has no incentive other than your outcome."
        leave: "A strategy built on current knowledge — not the version of AI your SI learned when they got certified"
      - category: "Team capability"
        feeling: "Our teams are using AI tools but not getting meaningful outcomes. The 95% failure rate applies to us too."
        shift: "Generic training that teaches AI in the abstract — not how to use it in the specific operational context of your organization"
        us: "Team training from practitioners who understand both the technology and how organizations actually deploy it"
        leave: "Teams that can identify, build, and land AI use cases in their specific function — not just talk about AI"
      - category: "Advisory incentives"
        feeling: "We're not sure our advisors are recommending what's best for us vs. what's best for their quota"
        shift: "Advisors with co-selling agreements, vendor partnerships, and quarterly targets that shape what they recommend"
        us: "We don't co-sell. We have no vendor relationships. We have one incentive: your outcome."
        leave: "Advisory you can trust — and a clear line of sight into why we're recommending what we're recommending"
      - category: "Macro context"
        feeling: "We don't understand how agentic AI, workforce shifts, and cost pressure interact with our specific situation"
        shift: "Advisors who aren't current enough to connect macro AI trends to your operational context"
        us: "Practitioners from MAG7 companies who see what's shipping and what it means for every functional area of your business"
        leave: "An AI strategy that accounts for where the technology is going, not just where it is today"
      - category: "Org readiness"
        feeling: "We've started AI pilots. Most of them are stalled or dead."
        shift: "Pilots designed for technology — not for the organizational conditions required to make them work"
        us: "Advisory that accounts for organizational structure, decision-making dynamics, and what it actually takes to move AI from pilot to production"
        leave: "Fewer failed pilots. More production deployments. A team that knows how to get AI to land."
    advisory_heading: "On independent advisory"
    advisory_para1: "The AI advisory market has a conflict-of-interest problem. Every major consulting firm, SI, and advisory practice is embedded in a web of vendor relationships and incentive structures that shape — consciously or not — what they recommend."
    advisory_para2: "This isn't a criticism of those firms. It's a structural reality. When your advisor co-sells with the platform they're recommending, the recommendation is compromised. When their team was certified on tools that were current 18 months ago, the strategy reflects that."
    advisory_statement: "We provide independent advisory. We don't co-sell."
    advisory_para3: "Our network is connected to the frontier of AI development. Our incentive is your outcome. That's the advisory relationship that organizations in the middle of an AI transformation actually need — and that the market isn't consistently delivering."
    cta_strip_heading: "AI for Enterprises — Custom engagement"
    cta_strip_sub: "Team training &nbsp;·&nbsp; AI strategy &nbsp;·&nbsp; Adoption roadmaps &nbsp;·&nbsp; Ongoing advisory"
    cta_strip_label: "Talk to us →"
    cta_strip_url: "mailto:aparoop@coworkerlabs.com?subject=Enterprise Inquiry"
    cta_strip_style: "btn-primary"

