missing_layer:
  section_label: "What's Actually Missing"
  heading_line1: "The instructors are excellent at explaining the technology."
  heading_line2: "None of them have been in the room when the VP killed the pilot."
  cards:
    - title: "What customer-facing experts know"
      paragraphs:
        - "The practitioners we bring in have sold AI solutions to enterprise customers. They've sat across the table from buyers, watched organizations make (and avoid) AI decisions, and seen why pilots succeed or fail in the real world."
        - "They know which use cases actually get funded. They know which organizational structures enable AI adoption and which quietly suffocate it. They know what a skeptical CFO needs to hear."
      quote: "It's rarely about the technology. It's about whether the organization is structured to act on it."
    - title: "What this gives you that no one else does"
      paragraphs:
        - "Two capabilities that turn AI knowledge into career leverage:"
        - "<strong style=\"color:var(--white)\">1. Identify the right use case.</strong> Not just any AI application — the one that fits your organizational context, can get funded, and can get done with the resources and structure you actually have."
        - "<strong style=\"color:var(--white)\">2. Navigate the organization.</strong> Understanding the political, structural, and cultural dynamics that determine whether an AI initiative lives or dies. This is what turns a good idea into a promotion."
      quote: "The professionals who drive AI change in their organizations aren't the most technical. They're the ones who understand both the technology and the terrain."
    - title: "A Capstone that can actually land"
      paragraphs:
        - "Every other program ends with a project designed to demonstrate what you learned. Ours ends with a plan designed to be used."
        - "Your Capstone is an AI adoption plan for your specific context — built with current tools, informed by current market reality, and shaped by educators who understand what organizations will actually support."
        - "You present it to your cohort in Week 4. You take it to work in Week 5."
      quote: ""
    - title: "A community that compounds over time"
      paragraphs:
        - "The course ends. The community doesn't."
        - "Every Coworker Labs graduate joins a private Silicon Valley AI community — practitioners, researchers, investors, and fellow professionals navigating the same transition you are."
        - "As AI evolves every two weeks, the community keeps you current. The knowledge you earn in the cohort stays relevant because the people around you are still building."
      quote: "Access to this community is access to a form of intelligence that isn't available in any course catalog."

founder_lens:
  section_label: "The Founder's Lens"
  heading: "Built by someone who has been on every side of the table — operational, commercial, and technical."
  cards:
    - num: "01"
      title: "Operational excellence at scale"
      body: "Aparoop has experienced how organizations run processes and workflows at scale — where the inefficiencies live, how decisions get made, what transformation actually takes to execute. He can look at any functional area and see the AI opportunity sitting right there. Not theoretically. Workflow by workflow."
    - num: "02"
      title: "Applied AI — bridge from technology to context"
      body: "His knowledge of Applied AI means he doesn't just understand what the technology does — he understands what it would take to deploy it inside a specific organizational setting. That bridge between capability and context is what most AI education misses entirely."
    - num: "03"
      title: "The Sales lens — both sides of the table"
      body: "He has sold AI solutions to enterprise customers. He's seen how seller organizations prioritize and position AI, and what buyer organizations actually care about versus what they say they care about. He understands the organizational limitations that shape AI adoption behavior across industries — not from a research paper, but from the room."
  outcome_heading: "What this means for you"
  outcome_para1: "A student who gets this total view — operational, technical, commercial, and organizational — can do something rare: <strong>identify real AI use cases in their area of work</strong>, navigate the organizational boundaries that would otherwise kill those ideas, and show genuine thought-leadership rather than surface-level AI awareness."
  outcome_para2: "They don't just learn AI. They learn how to <strong>make AI happen inside real organizations</strong>. That's the charter for a new kind of role. Coworker Labs is where professionals learn to claim it."

