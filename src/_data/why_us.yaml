# ──────────────────────────────────────────────
# SECTION 1 — PROFESSIONALS
# ──────────────────────────────────────────────

professionals:
  section_label: "For Professionals"
  heading: "You've done the courses. You still don't know what to do on Monday."

  reality_check:
    col_them_title: "Every other AI program"
    col_us_title: "Coworker Labs"
    them_steps:
      - icon: "1"
        icon_style: "red"
        strong_text: "You take the course."
        sub_text: "Professor from a top B-school. Computer scientist from a global university. Solid credentials. Dated content built for engineers."
      - icon: "2"
        icon_style: "red"
        strong_text: "You build a Capstone project."
        sub_text: "A theoretical AI application. Something that demonstrates you learned the material."
      - icon: "3"
        icon_style: "red"
        strong_text: "You go back to work."
        sub_text: "The Capstone has no home. The knowledge fades. The gap reopens."
      - icon: "✕"
        icon_style: "red"
        strong_text: "Certificate on LinkedIn. Nothing changed."
        strong_color: "red"
        sub_text: "You're still not sure what AI means for your role — or what to build on Monday."
    us_steps:
      - icon: "1"
        icon_style: "teal"
        strong_text: "You learn from Silicon Valley practitioners — not professors."
        sub_text: "MAG7 and top-tier SaaS practitioners run your cohort. Current architecture. Current tools. What they shipped last quarter."
      - icon: "2"
        icon_style: "teal"
        strong_text: "You build something real in your domain."
        sub_text: "A deployed project. An agentic AI tool. Something in your function — not a theoretical exercise. Educator support throughout."
      - icon: "3"
        icon_style: "teal"
        strong_text: "You leave as a builder — with a learning plan that compounds."
        sub_text: "Structured weekly learning plan. You don't show up to class cold. You show up having made progress."
      - icon: "✓"
        icon_style: "teal"
        strong_text: "You join a community that keeps you current."
        strong_color: "teal"
        sub_text: "Private Silicon Valley AI community — lifelong access. As AI changes every two weeks, the community keeps you ahead."

  comparison_table:
    section_label: "Side by Side"
    heading: "How we compare to other learning platforms."
    col_1_header: "Coursera / edX / Udemy"
    col_2_header: "University Programs"
    col_2_subheader: "(MIT, Wharton, Stanford online)"
    col_3_header: "Corporate Training"
    col_3_subheader: "(LinkedIn Learning, internal L&D)"
    col_4_header: "Coworker Labs"
    rows:
      - category: "Who teaches"
        col1: "Course creators — rarely active practitioners"
        col1_prefix: "cross"
        col2: "Professors — credentialed, not current"
        col2_prefix: "cross"
        col3: "L&D professionals, external consultants"
        col3_prefix: "cross"
        col4: "Silicon Valley practitioners from MAG7 and top-tier SaaS — building AI right now"
        col4_prefix: "check"
      - category: "Curriculum freshness"
        col1: "12–24 months behind the market"
        col1_prefix: "cross"
        col2: "Academic review cycles lag industry by 1–2 years"
        col2_prefix: "cross"
        col3: "Generic, risk-averse, designed for compliance"
        col3_prefix: "cross"
        col4: "Updated every cohort. Instructors work on what they teach."
        col4_prefix: "check"
      - category: "Domain relevance"
        col1: "Generic tracks — not function-specific"
        col1_prefix: "cross"
        col2: "Technology or management framing — not your role"
        col2_prefix: "cross"
        col3: "One-size-fits-all"
        col3_prefix: "cross"
        col4: "Built around your domain — product, ops, sales, finance, education"
        col4_prefix: "check"
      - category: "Hands-on building"
        col1: "Theoretical exercises, peer-graded"
        col1_prefix: "cross"
        col2: "Stronger projects — designed for academic evaluation"
        col2_prefix: "neutral"
        col3: "Rarely includes a project"
        col3_prefix: "cross"
        col4: "You build and deploy something real in your domain during the cohort"
        col4_prefix: "check"
      - category: "Learning plan"
        col1: "Self-directed. No structure between sessions."
        col1_prefix: "cross"
        col2: "Structured syllabus — not personalized"
        col2_prefix: "neutral"
        col3: "Modules. No continuity."
        col3_prefix: "cross"
        col4: "Personalized learning plan for each professional — progress compounds week over week"
        col4_prefix: "check"
      - category: "Community"
        col1: "Alumni group. No curation."
        col1_prefix: "cross"
        col2: "Academic alumni network — not practitioners"
        col2_prefix: "neutral"
        col3: "None"
        col3_prefix: "cross"
        col4: "Private Silicon Valley AI community — practitioners, researchers, builders. Lifelong access."
        col4_prefix: "check"
      - category: "Price"
        col1: "$0–$500 / course"
        col1_prefix: ""
        col2: "$2,000–$10,000+"
        col2_prefix: ""
        col3: "Employer-funded"
        col3_prefix: ""
        col4: "$499 / 14 hours. Cohort access and community included. Introductory pricing."
        col4_prefix: "check"

  promise:
    heading: "Every professional leaves as a builder."
    body: "Not just someone who understands AI — someone who has shipped something real during the cohort. That's the bar. That's what the learning platform, the educators, the learning plan, and the community are all designed to deliver."

# ──────────────────────────────────────────────
# SECTION 2 — ORGANIZATIONS
# ──────────────────────────────────────────────

organizations:
  section_label: "For Organizations"
  heading: "You know you need an AI strategy. You're not sure who to trust to help you build one."

  reality_check:
    col_them_title: "Most AI advisory today"
    col_us_title: "Coworker Labs"
    them_steps:
      - icon: "1"
        icon_style: "red"
        strong_text: "You engage a consulting firm or SI."
        sub_text: "Big 4. Global SI. Boutique AI consultancy. Confident in the room. High fees. Impressive slide decks."
      - icon: "2"
        icon_style: "red"
        strong_text: "You get a roadmap."
        sub_text: "Shaped by what the advisor is certified on. Which tools they're incentivized to sell. What their vendor partnerships allow them to recommend."
      - icon: "3"
        icon_style: "red"
        strong_text: "You implement."
        sub_text: "Wrong architecture. Wrong tools. Pilots stall. The strategy doesn't reflect where the technology actually is today."
      - icon: "✕"
        icon_style: "red"
        strong_text: "Budget spent. Gap unchanged."
        strong_color: "red"
        sub_text: "The organization is still not AI-ready. And the advisors have moved on to the next engagement."
    us_steps:
      - icon: "1"
        icon_style: "teal"
        strong_text: "Free 20-minute discovery call."
        sub_text: "No pitch. No deck. We listen to your situation and tell you honestly whether and how we can help."
      - icon: "2"
        icon_style: "teal"
        strong_text: "Independent advisory — no vendor relationships."
        sub_text: "We don't co-sell. We don't have platform partnerships. Our only incentive is your outcome."
      - icon: "3"
        icon_style: "teal"
        strong_text: "Strategy built on current knowledge."
        sub_text: "Fractional Silicon Valley practitioners who are building with the latest AI technologies today — not certified on tools from 18 months ago."
      - icon: "✓"
        icon_style: "teal"
        strong_text: "An AI strategy you can trust — and execute."
        strong_color: "teal"
        sub_text: "Built around your actual context, constraints, and operational goals. Not a generic framework applied to your logo."

  comparison_table:
    section_label: "Side by Side"
    heading: "How we compare to other AI advisory."
    col_1_header: "Big 4"
    col_2_header: "Global SIs"
    col_2_subheader: "(TCS, Infosys, Wipro)"
    col_3_header: "Boutique AI Firms"
    col_3_subheader: ""
    col_4_header: "Coworker Labs"
    rows:
      - category: "Advisor profile"
        col1: "Credentialed consultants — not AI builders"
        col1_prefix: "cross"
        col2: "Large delivery teams — knowledge spread thin"
        col2_prefix: "cross"
        col3: "Varies — often early-stage, limited track record"
        col3_prefix: "neutral"
        col4: "Fractional Silicon Valley practitioners actively building with AI today"
        col4_prefix: "check"
      - category: "Knowledge currency"
        col1: "Frameworks built on 12–18 month old AI knowledge"
        col1_prefix: "cross"
        col2: "Certification-based — not frontier knowledge"
        col2_prefix: "cross"
        col3: "Varies — depends on the firm"
        col3_prefix: "neutral"
        col4: "Current. Practitioners work on what they advise on."
        col4_prefix: "check"
      - category: "Vendor independence"
        col1: "Co-selling agreements with major platforms"
        col1_prefix: "cross"
        col2: "Deep vendor partnerships — recommendations shaped by quotas"
        col2_prefix: "cross"
        col3: "Often tool-aligned — built around a specific platform"
        col3_prefix: "cross"
        col4: "Fully independent. No vendor relationships. No co-selling."
        col4_prefix: "check"
      - category: "Organization size fit"
        col1: "Designed for enterprise — expensive for SMBs"
        col1_prefix: "cross"
        col2: "Minimum engagement sizes exclude most SMBs"
        col2_prefix: "cross"
        col3: "Variable — sometimes a fit, sometimes not"
        col3_prefix: "neutral"
        col4: "Built for small and mid-market organizations — accessible entry point"
        col4_prefix: "check"
      - category: "Entry point"
        col1: "Six-figure retainers"
        col1_prefix: "cross"
        col2: "Large project minimums"
        col2_prefix: "cross"
        col3: "Varies"
        col3_prefix: "neutral"
        col4: "Free 20-min discovery call · $199/hr · Long-term by scope"
        col4_prefix: "check"
      - category: "Industries served"
        col1: "Broad — often too generic per vertical"
        col1_prefix: "neutral"
        col2: "Broad — delivery model not vertical-specific"
        col2_prefix: "neutral"
        col3: "Usually one or two verticals"
        col3_prefix: "neutral"
        col4: "Professional services · EdTech · Retail · CPG · Private Equity · Manufacturing"
        col4_prefix: "check"

  advisory_statement:
    heading: "On independent advisory."
    body: "The AI advisory market has a conflict-of-interest problem. Every major consulting firm, SI, and advisory practice is embedded in a web of vendor relationships and incentive structures that shape — consciously or not — what they recommend. This isn't a criticism of those firms. It's a structural reality."
    statement: "We provide independent advisory. We don't co-sell."
    follow: "Our network is connected to the frontier of AI development. Our incentive is your outcome. That's the advisory relationship that small and mid-market organizations actually need — and that the market isn't consistently delivering."

