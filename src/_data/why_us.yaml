hero:
  section_label: "Why Coworker Labs"
  heading_line1: "Other programs give you a Capstone."
  heading_line2: "We give you a plan that works."
  subtext: "The gap isn't what you learn. It's what happens when you take it back to work. Most AI education ends there. Ours starts there."
  cta_label: "Apply for the April Cohort →"
  cta_url: "index.html#apply"

reality_check:
  section_label: "The Reality Check"
  heading_line1: "What other programs promise."
  heading_line2: "What actually happens."
  col_them_title: "Every other AI program"
  col_us_title: "Coworker Labs"
  them_steps:
    - icon: "1"
      icon_style: "red"
      strong_text: "You take the course."
      sub_text: "Professor from a top B-school. Computer scientist from a global university. Solid credentials. Dated content."
    - icon: "2"
      icon_style: "red"
      strong_text: "You build a Capstone project."
      sub_text: "An AI application. A use case. Something that demonstrates you learned the theory."
    - icon: "3"
      icon_style: "red"
      strong_text: "You go back to work."
      sub_text: "The Capstone doesn't have a home. IT blocks the rollout. The VP needs a business case. The pilot dies in procurement."
    - icon: "✕"
      icon_style: "red"
      strong_text: "Temporary win. Then nothing."
      strong_color: "red"
      sub_text: "Certificate on LinkedIn. Knowledge fades. Gap reopens."
  us_steps:
    - icon: "1"
      icon_style: "teal"
      strong_text: "You learn from people inside the industry."
      sub_text: "Practitioners from Silicon Valley MAG7 companies — not professors studying them. Current architecture, not four-month-old curriculum."
    - icon: "2"
      icon_style: "teal"
      strong_text: "You understand how organizations actually adopt AI."
      sub_text: "Experts from customer-facing teams share what's working, what's failing, and why. You learn the organizational terrain — not just the technology."
    - icon: "3"
      icon_style: "teal"
      strong_text: "You build a Capstone grounded in the market right now."
      sub_text: "Not a theoretical exercise. A real AI adoption plan for your specific context — built with current tools, current constraints, current opportunity."
    - icon: "✓"
      icon_style: "teal"
      strong_text: "You go back to work with a plan that can actually land."
      strong_color: "teal"
      sub_text: "And a private Silicon Valley community that keeps you current as the technology evolves."

