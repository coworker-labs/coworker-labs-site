  description: "Most AI education is built for engineers. Most AI advisory is shaped by vendor incentives. Coworker Labs is built for neither — it's built for you."

hero:
  section_label: "Why Coworker Labs"
  heading_line1: "Most AI education is built for engineers."
  heading_line2: "Most AI advisory is shaped by vendor incentives. Coworker Labs is built for neither — it's built for you."
