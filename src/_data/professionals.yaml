meta:
  title: "For Professionals — Coworker Labs"
  description: "AI fundamentals, vibe coding, and hands-on building for non-technical professionals and engineers. Cohort-based learning led by Silicon Valley practitioners."

hero:
  section_label: "For Professionals"
  heading_line1: "AI is changing your role."
  heading_line2: "We help you stay ahead of it."
  subtext: "Not a generic course. Not a certificate. A cohort led by Silicon Valley practitioners — where you build something real in your domain and join a Bay Area AI community that keeps you current long after it ends."

problem:
  section_label: "The Problem"
  heading: "You've taken the courses. You still don't know what to build on Monday."
  body_para1: "The world has moved to agentic AI. Most professionals are still figuring out what that means for their role. They've taken courses. Watched YouTube. Attended webinars. They can talk about AI in a meeting. But they can't point to anything they've built with it — and they're watching the gap widen."
  body_para2: "The courses are generic, dated, and built for engineers. There is no learning program designed for the program manager, the operations lead, the marketing director, or the finance analyst asking: what does AI actually mean for my work — and what do I build on Monday?"
  kicker: "That's the gap Coworker Labs is built for."

comparison:
  section_label: "How We're Different"
  heading: "Three things that set Coworker Labs apart."
  col_them: "Other platforms"
  col_us: "Coworker Labs"
  rows:
    - category: "Who teaches"
      them: "Professors and course creators — credentialed, not current"
      us: "Silicon Valley practitioners from MAG7 and top-tier SaaS — building AI right now"
    - category: "What you build"
      them: "Theoretical exercises and generic Capstones designed for academic evaluation"
      us: "A real, deployed project in your domain — something you can point to"
    - category: "What comes next"
      them: "A certificate on LinkedIn. The knowledge fades. The gap reopens."
      us: "Lifelong access to a private Bay Area AI community — practitioners, researchers, builders"

curriculum:
  section_label: "Cohort 1 — April 28, 2026"
  heading: "Step into the World of AI"
  subheading: "Four weeks. Four capstone projects. Silicon Valley practitioners in every session."
  weeks:
    - number: "01"
      title: "Fundamentals of AI & Prompt Engineering"
      instructor: "Prafulla Rawal · Google"
      project_label: "Capstone"
      project: "Build your prompt"
      project_detail: "Design prompts that solve a real problem in your actual workflow — not a generic demo."
    - number: "02"
      title: "Understanding Product Value"
      instructor: "Aparoop & Prafulla Rawal"
      project_label: "Capstone"
      project: "Build your product vision"
      project_detail: "Define an AI initiative in your area of work — a real use case you could take back to your organization."
    - number: "03"
      title: "Build Your Website"
      instructor: "Ayan Putatunda · Zendesk"
      project_label: "Capstone"
      project: "Build your website"
      project_detail: "Build and deploy your own website during the week. No code required. Live, deployed product."
    - number: "04"
      title: "Bring Your Own Project"
      instructor: "Aparoop & Ayan Putatunda"
      project_label: "Capstone"
      project: "Build the PRD"
      project_detail: "Define your own AI project and write a full Product Requirements Document. Present to the cohort."
  time_label: "Time commitment"
  time_detail: "16 hours of live classes &nbsp;·&nbsp; weekly activities"
  community_note: "Every graduate joins a private Bay Area AI community — practitioners, educators, and researchers from Silicon Valley. Lifelong access. Your network in the Bay."
  not_for_label: "This cohort is not for everyone."
  not_for_note: "Built for professionals at the boundary — not for engineers or advanced AI users."
  coming_soon: "Coworker Pro — For engineers &amp; builders &nbsp;·&nbsp; Build your coworker &nbsp;·&nbsp; Coming soon"

