meta:
  title: "About — Coworker Labs"
  description: "The AI knowledge gap is real. We built Coworker Labs to close it — for professionals who want to build, and organizations that need a strategy they can trust."

hero:
  section_label: "About Coworker Labs"
  heading_line1: "The AI knowledge gap is real."
  heading_line2: "We built Coworker Labs to close it."
  subtext: "The people who actually understand what AI can do — and where it's going — are concentrated in one city. The rest of the world is learning from content that was already out of date when it was published. Coworker Labs is the bridge."

founder:
  section_label: "The Founder"
  name: "Aparoop"
  title: "Founder, Coworker Labs"
  linkedin_url: "https://www.linkedin.com/in/aparoop/"
  linkedin_label: "↗ linkedin.com/in/aparoop"
  heading: "Built by someone who has been on every side of this problem."
  story: "Aparoop spent 10 years at Google solving organizational workflows and processes — and buying from system integrators. He knows what good advisory looks like, and what conflicted advisory costs. The last four years he has been inside the rooms where AI is actually being built — Silicon Valley founder communities, VC investment circles, researcher meetups, AI SaaS workshops, builder networks — while selling AI solutions to enterprise buyers. He came in as a non-technical professional. He left having built AI products, including this one. He understands what professionals need to stay relevant. He understands what organizations need to stop getting it wrong. Coworker Labs is built on that lens."

why:
  section_label: "Why We Exist"
  heading: "The gap is bigger than most people realize."
  paragraphs:
    - "Aparoop has spent four years in rooms where the frontier of AI is discussed — VC investment circles, founder communities, researcher meetups, builder networks. What he kept seeing was the same thing: a massive gap between what the people in those rooms knew and what was available to everyone else."
    - "Not just in developing markets. In APAC, in EMEA, and across the US outside of San Francisco, even the most enthusiastic AI professionals are working with a version of AI that is already behind. The knowledge is current in one city. The rest of the world is catching up — often with outdated courses, dated advisory, and frameworks built for a technology that has already moved on."
    - "That gap has a cost. Professionals make career decisions on outdated information. Organizations build AI strategies on frameworks that reflect last year's technology. The decisions made today will shape careers and organizational architecture for years."
    - "Coworker Labs exists to close that gap — by bringing Silicon Valley's AI expertise directly to the professionals and organizations that need it most."

team:
  section_label: "The Team"
  heading: "Practitioners from MAG7 and top-tier Silicon Valley SaaS — building AI today, teaching and advising tomorrow."
  intro: "The Coworker Labs network is not a faculty board. It's a live network of Silicon Valley practitioners actively building with AI. They bring what they shipped last quarter into every cohort session and consulting engagement."
  categories:
    - label: "Instructors"
      count: "6+"
      description: "Silicon Valley educators who run cohorts, design learning plans, and support professionals as they build"
    - label: "Consulting Experts"
      count: "4+"
      description: "Fractional practitioners who lead AI strategy and transformation engagements for organizations"
    - label: "Community Contributors"
      count: "10+"
      description: "AI practitioners, researchers, and builders from MAG7 and top-tier SaaS — active in the community"

community:
  section_label: "The Community"
  heading: "You don't just learn from Silicon Valley. You join it."
  body_para1: "Every Coworker Labs cohort graduate joins a private Silicon Valley AI community — a curated network of practitioners, researchers, educators, and fellow professionals navigating the same transition. Access is earned through the program, not sold separately."
  body_para2: "The community is the compounding asset. The cohort teaches you what AI can do today. The community keeps you current as it changes tomorrow — every two weeks, as new benchmarks drop and new architectures emerge. Members share what they're seeing, what they're building, where the field is heading."
  statement: "The cohort ends. The community doesn't."
  note: "Community platform coming soon. Cohort graduates get first access."

