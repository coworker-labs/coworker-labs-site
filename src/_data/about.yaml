meta:
  title: "About Us — Coworker Labs"
  description: "Coworker Labs exists to close the AI knowledge gap — for the professionals who need a clear on-ramp and the organizations that need a strategy they can trust."

hero:
  section_label: "About Coworker Labs"
  heading_line1: "The AI knowledge gap is real."
  heading_line2: "We built Coworker Labs to close it."
  subtext: "Silicon Valley has figured out AI. The rest of the world is catching up — often with outdated courses, dated advisory, and frameworks built for a technology that has already moved on. Coworker Labs is the bridge."

mission:
  section_label: "Our Mission"
  heading: "Closing the AI knowledge gap — for everyone left outside the room where AI is actually being built."
  paragraphs:
    - "The world's AI expertise is concentrated in one city. The decisions being made everywhere else — about careers, about organizational strategy, about where to start with AI — are often made on outdated information."
    - "Professionals are taking courses built for engineers. Organizations are receiving advisory shaped by vendor relationships. The gap between what's possible with AI and what most professionals and organizations actually know is wider than most realize."
    - "Coworker Labs exists to close that gap. Silicon Valley practitioners — teaching, advising, and building alongside the professionals and organizations that need them most."

why:
  section_label: "Why We Exist"
  heading: "The gap is bigger than most people realize."
  paragraphs:
    - "AI benchmarks have improved at a pace no education market can match. What was published as a course 18 months ago reflects a technology that has already moved on. And now agentic AI — systems that don't just answer questions but take actions, run workflows, make decisions — is the next transformation layer."
    - "Most professionals and organizations are navigating this transition without access to current knowledge. Not because they aren't trying. Because the people who are current are in Silicon Valley — and the knowledge isn't getting out fast enough."
    - "Coworker Labs was built to change that."

team:
  section_label: "The Team"
  heading: "Practitioners from MAG7 and top-tier Silicon Valley SaaS — building AI today, teaching and advising tomorrow."
  intro: "The Coworker Labs network is not a faculty board. It's a live network of Silicon Valley practitioners actively building with AI. They bring what they shipped last quarter into every cohort session and consulting engagement."
  categories:
    - label: "Instructors"
      count: "6+"
      description: "Silicon Valley educators who run cohorts, design learning plans, and support professionals as they build"
    - label: "Consulting Experts"
      count: "4+"
      description: "Fractional practitioners who lead AI strategy and transformation engagements for organizations"
    - label: "Community Contributors"
      count: "10+"
      description: "AI practitioners, researchers, and builders from MAG7 and top-tier SaaS — active in the community"

community:
  section_label: "The Community"
  heading: "You don't just learn from Silicon Valley. You join it."
  body_para1: "Every Coworker Labs cohort graduate joins a private Bay Area AI community — a curated network of practitioners, researchers, educators, and fellow professionals. Access is earned through the program, not sold separately."
  body_para2: "This is your network in the Bay. The cohort teaches you what AI can do today. The community keeps you current as it changes — and opens doors to career opportunities in Silicon Valley and beyond."
  statement: "The cohort ends. The community doesn't."
  note: "Community platform coming soon. Cohort graduates get first access."

