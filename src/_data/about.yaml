hero:
  section_label: "About Coworker Labs"
  heading_line1: "Independent advisory."
  heading_line2: "No vendor relationships. No co-selling."
  subtext: "Coworker Labs was built on a simple observation: the organizations most in need of good AI advisory are the ones least likely to receive it — because every major advisory channel in the market has a commercial incentive to recommend something other than what is right for the organization."

advisor:
  section_label: "The Advisor"
  name: "Aparoop Chakraborty"
  title: "Founder, Coworker Labs · San Francisco Bay Area"
  linkedin_url: "https://www.linkedin.com/in/aparoop/"
  linkedin_label: "↗ linkedin.com/in/aparoop"
  heading: "The advisor who has been on every side of this problem."
  story: "Aparoop spent 11 years at Google running operations at scale — workforce management at YouTube, vendor governance across the outsourcing ecosystem, cross-functional program management for Alphabet. He sat across Accenture, Cognizant, Concentrix, and Wipro as the buyer for over a decade. He knows what good advisory looks like, and what conflicted advisory costs. Two years at Cognizant as an enterprise sales executive gave him the view from the other side — watching AI transformation engagements get shaped by quarterly quotas and vendor partnerships rather than organizational outcomes. The last four years have been spent at the intersection of enterprise AI strategy and hands-on building in Silicon Valley — consulting clients on use cases, staying current through practitioner networks, and building the framework that became Coworker Labs."

why:
  section_label: "Why Independent Advisory"
  heading: "The AI advisory market has a structural problem."
  paragraphs:
    - "System integrators are under quarterly sales pressure. Their best AI talent has left — to build startups, join AI SaaS companies, work at the frontier. What remains is a sales organization recommending AI strategies built on certifications from 18 months ago. The advice reflects what they can deliver — not what the organization needs."
    - "Hyperscalers sell compute. Every recommendation they make about architecture, tooling, and data platforms runs through the lens of what maximizes consumption on their cloud. Organizational efficiency optimization is not their incentive. It is, in fact, against it."
    - "SaaS platforms embed AI in existing products and call it transformation. Adopting AI features in your existing tools is not becoming AI-first. It is buying more features."
    - "The result: organizations receive AI strategies shaped by what their advisors are paid to recommend. Wrong architecture gets built. Pilots stall. The gap between AI investment and AI outcomes widens."
  statement: "Coworker Labs provides independent advisory. We don't co-sell. We have no vendor relationships. Our advice has one incentive: your outcome."

approach:
  section_label: "The Approach"
  heading: "Workflow-first. Outcome-measured. Independently advised."
  pillars:
    - title: "Start with workflows — not tools"
      body: "Most AI strategies start with technology selection. Coworker Labs starts with your workflows — where work actually happens, where time is being lost, and where AI creates the most leverage. The tools follow the strategy. The strategy follows the workflow."
    - title: "Measure what matters"
      body: "Two metrics govern every engagement: cost per unit of service and usage per employee. Both must move together. If cost per unit isn't going down, the ROI isn't there. If usage per employee isn't going up, adoption has failed. Most organizations have neither metric defined before they start."
    - title: "Build for adoption — not compliance"
      body: "AI transformation is 70% change management. Employees adopt AI when it solves a real problem for them — not when leadership mandates it. Every engagement is designed to drive genuine adoption from the bottom up, not performative adoption from the top down."

cta:
